name: ci

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main, release/**]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Open-source readiness gate — runs the Agent Gate from devkit/gate/opensource.py
  #    First-pass for new contributors; mandatory for first PR of a new account.
  # ---------------------------------------------------------------------------
  opensource-gate:
    name: Open-source Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run opensource_gate
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 -m devkit.gate.opensource . --json > /tmp/oss-gate.json
          # Print human-readable version too
          python3 -m devkit.gate.opensource .
          # Exit non-zero on NO-GO so the job fails
          python3 -c "
          import json, sys
          r = json.load(open('/tmp/oss-gate.json'))
          if r['verdict'] == 'NO-GO':
              print('Open-source gate: NO-GO', file=sys.stderr)
              sys.exit(1)
          print('Open-source gate:', r['verdict'])
          "

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opensource-gate-report
          path: /tmp/oss-gate.json

  # ---------------------------------------------------------------------------
  # 2. Unit / contract tests — pure stdlib, no live gateway required.
  # ---------------------------------------------------------------------------
  test-python:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-crew.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 -m unittest discover tests/ -v
          python3 -m unittest discover devkit/tests -v 2>/dev/null || true

      - name: YAML lint (light)
        run: |
          python3 - <<'PY'
          import sys, pathlib
          ok = True
          for p in [
            "litellm/config.full.yaml",
            "litellm/config.yaml",
            "litellm/config.mock.yaml",
            "litellm/config.with-subscriptions.yaml",
            ".github/workflows/ci.yml",
          ]:
              f = pathlib.Path(p)
              if not f.is_file():
                  print(f"skip missing {p}")
                  continue
              try:
                  import yaml
                  yaml.safe_load(f.read_text())
                  print(f"yaml ok: {p}")
              except ImportError:
                  # PyYAML not available — fall back to a header sanity check
                  head = f.read_text().splitlines()[0]
                  if head.startswith(("model_list:", "#", "name:", "on:")):
                      print(f"yaml ok (header check): {p}")
                  else:
                      print(f"yaml WARN: {p} — install pyyaml for real lint")
                      ok = False
              except Exception as e:
                  print(f"yaml FAIL: {p} — {e}")
                  ok = False
          if not ok:
              sys.exit(1)
          PY

  # ---------------------------------------------------------------------------
  # 3. Markdown / docs sanity (light). Heavy docs lint is overkill at v0.1.
  # ---------------------------------------------------------------------------
  docs-sanity:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure key docs exist
        run: |
          set -e
          for f in README.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md LICENSE; do
            test -f "$f" || { echo "MISSING $f"; exit 1; }
            test -s "$f" || { echo "EMPTY $f"; exit 1; }
            echo "ok: $f ($(wc -c < "$f") bytes)"
          done
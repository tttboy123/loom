# ============================================================
# Loom 额度薅羊毛配置 —— 声明每个后端的「免费额度 / 是否订阅」。
# 复制成 loom.quota.toml 后按你的真实情况改；Loom 会拿真实花费（经本网关）算剩余。
#
# 说明：Loom 只能统计「经本网关花掉」的部分，不知道你账户里自注册以来的总消耗，
#       所以「剩余」是个面向未来的薅羊毛参考，不是账单级精确值。
# 字段：
#   subscription = true   订阅后端（不计 $，永远最优先薅）
#   free_usd     = 5.0    注册赠送 / 免费额度（美元），Loom 用真实已用算剩余
#   note         = "..."  备注（如免费模型名、领取方式）
# ============================================================

[claude]
subscription = true
note = "Claude 订阅（经 CLIProxyAPI），不计 API 费"

[codex]
subscription = true
note = "ChatGPT/Codex 订阅，不计 API 费"

[deepseek]
free_usd = 0.0          # 例：注册赠送额度填这里（按你领到的改）
note = "新用户常有赠送额度，按实际填"

[glm]
free_usd = 0.0
note = "智谱有免费模型（如 glm-4-flash），可单独把某角色 carrier 指过去白嫖"

[minimax]
free_usd = 0.0
note = "按你领到的试用额度填"

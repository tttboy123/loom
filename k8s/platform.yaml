# 云上部署（K8s）。Postgres/Redis 建议用云托管实例，这里只放无状态层。
# 前置：
#   kubectl create secret generic model-keys \
#     --from-literal=ANTHROPIC_API_KEY=... --from-literal=OPENAI_API_KEY=... \
#     --from-literal=ZHIPU_API_KEY=... --from-literal=DEEPSEEK_API_KEY=... \
#     --from-literal=MOONSHOT_API_KEY=... --from-literal=LITELLM_MASTER_KEY=... \
#     --from-literal=DATABASE_URL=... --from-literal=LITELLM_DATABASE_URL=...
#   kubectl create configmap litellm-config --from-file=config.yaml=litellm/config.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: litellm }
spec:
  replicas: 2
  selector: { matchLabels: { app: litellm } }
  template:
    metadata: { labels: { app: litellm } }
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports: [{ containerPort: 4000 }]
          envFrom: [{ secretRef: { name: model-keys } }]
          env:
            - { name: REDIS_HOST, value: "redis-master" }   # 多副本共享限流/路由状态
            - { name: REDIS_PORT, value: "6379" }
          volumeMounts: [{ name: cfg, mountPath: /app/config.yaml, subPath: config.yaml }]
          readinessProbe: { httpGet: { path: /health/readiness, port: 4000 }, initialDelaySeconds: 10 }
      volumes: [{ name: cfg, configMap: { name: litellm-config } }]
---
apiVersion: v1
kind: Service
metadata: { name: litellm }
spec:
  selector: { app: litellm }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: agentos }
spec:
  replicas: 3
  selector: { matchLabels: { app: agentos } }
  template:
    metadata: { labels: { app: agentos } }
    spec:
      containers:
        - name: agentos
          image: your-registry/agent-platform:latest   # 用本仓库 Dockerfile 构建推送
          ports: [{ containerPort: 8000 }]
          envFrom: [{ secretRef: { name: model-keys } }]
          env:
            - { name: LITELLM_BASE_URL, value: "http://litellm:4000" }
            - { name: CREW_SERVICE_URL, value: "http://crew-service:8001" }
          readinessProbe: { httpGet: { path: /health, port: 8000 }, initialDelaySeconds: 15 }
          resources: { requests: { cpu: "250m", memory: "512Mi" }, limits: { cpu: "1", memory: "1Gi" } }
---
apiVersion: v1
kind: Service
metadata: { name: agentos }
spec:
  selector: { app: agentos }
  ports: [{ port: 80, targetPort: 8000 }]
---
# 弹性扩展：按 CPU 自动扩缩 AgentOS
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: agentos-hpa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: agentos }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }

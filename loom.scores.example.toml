# ============================================================
# Loom 模型「官网/公开评测分」参考表 —— 复制成 loom.scores.toml 自己填。
#
# 诚实声明：Loom **不会替你杜撰**这些分数。请你按自己信任的来源（各家官方文档、
# 公开榜单如 LMArena / 各类 benchmark）折算成 0-100 自行填入，并在 note 里标来源与日期。
# 这一列只进「综合分」的 official 权重（默认 0.3），实际使用分和你的 👍/👎 仍是主导。
#
# 留空 / 填 0 = 该后端不计官网分（综合分只用实际使用 + 用户评分）。
# ============================================================

[claude]
official = 0      # 例：按你信任的榜单把 Claude 折算成 0-100 填这里
note = "来源/日期自填"

[codex]
official = 0
note = "来源/日期自填"

[deepseek]
official = 0
note = "来源/日期自填"

[glm]
official = 0
note = "来源/日期自填"

[minimax]
official = 0
note = "来源/日期自填"
